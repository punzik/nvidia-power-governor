# nvidia-power-governor configuration

[global]
# Polling interval in milliseconds
poll_interval=1000
# Number of temperature samples to average
avg_samples=5
# Power adjustment step in watts
power_step=1
# Temperature hysteresis in degrees Celsius
hysteresis=3

[gpu.0]
# Maximum temperature before reducing power (°C)
max_temp=80
# Maximum power limit (W)
max_power=300
# Minimum power limit (W)
min_power=50

[gpu.1]
max_temp=75
max_power=250
min_power=50
