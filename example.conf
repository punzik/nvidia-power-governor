# nvidia-power-governor configuration

[global]
# Polling interval in milliseconds
poll_interval=1000
# Number of temperature samples to average
avg_samples=5
# Temperature hysteresis in degrees Celsius
hysteresis=3

[gpu.0]
# Maximum temperature before reducing power (°C)
max_temp=80
# Maximum power limit (W)
max_power=300
# Minimum power limit (W)
min_power=50
# Power adjustment step up in watts (when cooling down)
power_step_up=20
# Power adjustment step down in watts (when overheating)
power_step_down=10

[gpu.1]
max_temp=75
max_power=250
min_power=50
power_step_up=10
power_step_down=10
